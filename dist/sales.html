    var authedAt = Number(localStorage.getItem("adminAuthedAt"));
    var fresh = Number.isFinite(authedAt) && Date.now() - authedAt < TTL_MS;

  } catch (e) {
    return;
  }

  // Expose to other public scripts (e.g., reorder toggle) without duplicating auth logic.

})();
